kind = "slides"
previewPath = "/maquinas-vapor/"
title = "Máquinas a Vapor"
version = "1.0.0"
id = "artifacts/maquinas-vapor"
router = "path"

[[integratedSkills]]
name = "slides"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/maquinas-vapor/" ]
localPort = 20098

[services.development]
run = "pnpm --filter @workspace/maquinas-vapor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/maquinas-vapor", "run", "build" ]
publicDir = "artifacts/maquinas-vapor/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20098"
BASE_PATH = "/maquinas-vapor/"
